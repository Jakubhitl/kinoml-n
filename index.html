<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HereNow 🌍</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.7.0/dist/geosearch.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script type="module">
  // Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";
  import { getDatabase, ref as dbRef, set, get, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCKSAd21NHJD9JqDjzrh9mymsVv5gWxJZM",
    authDomain: "herenow-8eddf.firebaseapp.com",
    projectId: "herenow-8eddf",
    storageBucket: "herenow-8eddf.firebasestorage.app",
    messagingSenderId: "214740805207",
    appId: "1:214740805207:web:f7967926724e3b26bfa512",
    measurementId: "G-MQ1LVHF0N9",
    databaseURL: "https://herenow-8eddf-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);
  const database = getDatabase(app);
</script>

<style>
:root {
  --accent:#3b82f6;
  --glass-bg:rgba(255,255,255,0.25);
  --blur-bg:blur(10px);
}

body{margin:0;font-family:"Poppins",system-ui,sans-serif;height:100vh;background:linear-gradient(135deg,#dbeafe,#eff6ff);overflow:hidden;}
#map{height:100vh;width:100%;z-index:0;}

#infoPanel{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--glass-bg);backdrop-filter:var(--blur-bg);
  border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.25);
  color:white; z-index:1000; display:none; flex-direction:column; gap:10px; min-width:200px;
}
#infoPanel input[type=text]{border:none;outline:none;background:rgba(255,255,255,0.15);padding:6px 10px;border-radius:10px;color:white;width:100%;}
#infoPanel button{border:none;border-radius:10px;padding:6px 12px;background:rgba(255,255,255,0.25);color:white;cursor:pointer;font-weight:500;transition:all 0.2s;}
#infoPanel button:hover{background:rgba(255,255,255,0.35);}

.custom-search{position:absolute;top:10px;right:10px;background: var(--glass-bg);backdrop-filter: var(--blur-bg);border-radius:14px;padding:8px 14px;display:flex;align-items:center;gap:8px;z-index:1000;border:1px solid rgba(255,255,255,0.4);}
.custom-search input{border:none;background:transparent;outline:none;color:white;font-size:0.95rem;width:120px;}
.custom-search input::placeholder{color: rgba(255,255,255,0.8);}
.custom-search i{color:white;opacity:0.9;}

.gallery-panel{position:absolute;top:10px;left:10px;width:200px;max-height:60vh;background:var(--glass-bg);backdrop-filter:var(--blur-bg);border-radius:16px;padding:10px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.15); z-index:1000;}
.gallery-item{margin-bottom:10px;cursor:pointer;}
.gallery-item img{width:100%;border-radius:10px;display:block;}
.gallery-item .text{color:white;font-size:0.8rem;text-align:center;margin-top:2px;opacity:0.9;}
#clearBtn{width:100%;padding:6px 10px;border:none;border-radius:10px;background:rgba(255,255,255,0.25);color:white;cursor:pointer;font-weight:500;transition:all 0.2s;margin-bottom:10px;}
#clearBtn:hover{background:rgba(255,255,255,0.35);}

.leaflet-control-zoom{bottom:20px !important; top:auto !important; right:20px !important; left:auto !important;background: var(--glass-bg); backdrop-filter: var(--blur-bg); border:1px solid rgba(255,255,255,0.3); border-radius:12px; overflow:hidden; box-shadow:0 3px 15px rgba(0,0,0,0.2);}
.leaflet-control-zoom a{color:white !important; background:transparent !important; border:none !important; transition:background 0.2s;}
.leaflet-control-zoom a:hover{background: rgba(255,255,255,0.2) !important;}

.leaflet-popup-content img{width:180px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.2);display:block;margin:auto;}
.leaflet-popup-content .caption{text-align:center;font-size:0.85rem;margin-top:4px;}

@media(max-width:600px){
  .gallery-panel{width:140px;top:60px;}
  .custom-search{top:60px; right:10px;}
}
</style>
</head>
<body>

<div id="infoPanel">
  <input type="text" id="nameInput" placeholder="Tvé jméno">
  <input type="text" id="captionInput" placeholder="Popisek">
  <button id="saveBtn">Přidat fotku</button>
</div>

<div class="custom-search">
  <i data-lucide="search" style="width:18px;height:18px;"></i>
  <input type="text" id="citySearch" placeholder="Hledat město...">
</div>

<div class="gallery-panel" id="gallery">
  <button id="clearBtn">Vymazat všechny fotky</button>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none;">
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-geosearch@3.7.0/dist/bundle.min.js"></script>
<script type="module">
lucide.createIcons();

import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";
import { getDatabase, ref as dbRef, set, get, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKSAd21NHJD9JqDjzrh9mymsVv5gWxJZM",
  authDomain: "herenow-8eddf.firebaseapp.com",
  projectId: "herenow-8eddf",
  storageBucket: "herenow-8eddf.firebasestorage.app",
  messagingSenderId: "214740805207",
  appId: "1:214740805207:web:f7967926724e3b26bfa512",
  measurementId: "G-MQ1LVHF0N9",
  databaseURL: "https://herenow-8eddf-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const database = getDatabase(app);

const map = L.map("map").setView([50.0755,14.4378],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'&copy; OpenStreetMap'}).addTo(map);
map.zoomControl.setPosition("bottomright");

const {OpenStreetMapProvider}=window.GeoSearch;
const provider=new OpenStreetMapProvider();
const citySearch=document.getElementById("citySearch");
citySearch.addEventListener("keypress", async e=>{
  if(e.key==="Enter" && citySearch.value.trim()){
    const results=await provider.search({query:citySearch.value});
    if(results.length>0){const {x,y}=results[0];map.flyTo([y,x],11,{duration:1.5});}
    else alert("Město nenalezeno 😕");
  }
});

const infoPanel=document.getElementById("infoPanel");
const nameInput=document.getElementById("nameInput");
const captionInput=document.getElementById("captionInput");
const saveBtn=document.getElementById("saveBtn");
const photoInput=document.getElementById("photoInput");
const gallery=document.getElementById("gallery");
const clearBtn=document.getElementById("clearBtn");

let pendingLatLng=null;
let currentFile=null;

// načtení fotek z Firebase
loadPhotos();

// klik na mapu → vybrat fotku
map.on("click", e=>{
  pendingLatLng=e.latlng;
  photoInput.click();
});

photoInput.addEventListener("change", e=>{
  if(!e.target.files[0]) return;
  currentFile=e.target.files[0];
  infoPanel.style.display="flex";
});

saveBtn.addEventListener("click", async ()=>{
  if(!currentFile || !pendingLatLng) return;
  const name=nameInput.value.trim()||"Neznámý";
  const caption=captionInput.value.trim()||"";
  const timestamp=Date.now();
  const id=`${timestamp}_${Math.random().toString(36).substr(2,9)}`;
  const fileRef=ref(storage,`photos/${id}.jpg`);
  await uploadBytes(fileRef,currentFile);
  const url=await getDownloadURL(fileRef);
  await set(dbRef(database,`photos/${id}`),{lat:pendingLatLng.lat,lng:pendingLatLng.lng,image:url,name,caption,timestamp});
  addPhotoMarker({lat:pendingLatLng.lat,lng:pendingLatLng.lng,image:url,name,caption});
  loadPhotos();
  infoPanel.style.display="none";
  currentFile=null;
  nameInput.value="";
  captionInput.value="";
});

async function loadPhotos(){
  const snapshot=await get(dbRef(database,"photos"));
  if(!snapshot.exists()) return;
  const data=snapshot.val();
  gallery.querySelectorAll(".gallery-item").forEach(e=>e.remove());
  map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
  Object.entries(data).forEach(([id,p])=>{
    if(Date.now()-p.timestamp>24*60*60*1000){remove(dbRef(database,`photos/${id}`));return;}
    addPhotoMarker(p);
    const div=document.createElement("div");
    div.className="gallery-item";
    div.innerHTML=`<img src="${p.image}"/><div class="text"><b>${p.name}</b>: ${p.caption}</div>`;
    div.onclick=()=>map.flyTo([p.lat,p.lng],15,{duration:1});
    gallery.appendChild(div);
  });
}

function addPhotoMarker({lat,lng,image,name,caption}){
  const marker=L.marker([lat,lng]).addTo(map);
  marker.bindPopup(`<img src="${image}"/><div class="caption"><b>${name}</b>: ${caption}</div>`);
}

clearBtn.addEventListener("click", async ()=>{
  if(confirm("Opravdu smazat všechny fotky?")){
    await remove(dbRef(database,"photos"));
    loadPhotos();
  }
});
</script>
</body>
</html>
