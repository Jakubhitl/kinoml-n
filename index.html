<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HereNow 🌍</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }
    #map {
      width: 100vw;
      height: 100vh;
    }
    .popup-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(10px);
      background: rgba(20,20,20,0.7);
      padding: 12px;
      border-radius: 10px;
      color: #fff;
      width: 200px;
    }
    input, textarea, button {
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      width: 100%;
    }
    button {
      background: #00bfa6;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00a892;
    }
    .delete-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255, 50, 50, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      z-index: 999;
    }
  </style>
</head>
<body>

  <button class="delete-btn" onclick="deleteAllPhotos()">🗑️ Smazat všechny fotky</button>
  <div id="map"></div>

  <!-- Firebase SDKs -->
  <script type="module">
    // Import SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    // 🔥 Tvůj Firebase config (ten, co jsi poslal)
    const firebaseConfig = {
      apiKey: "AIzaSyCKSAd21NHJD9JqDjzrh9mymsVv5gWxJZM",
      authDomain: "herenow-8eddf.firebaseapp.com",
      projectId: "herenow-8eddf",
      storageBucket: "herenow-8eddf.firebasestorage.app",
      messagingSenderId: "214740805207",
      appId: "1:214740805207:web:f7967926724e3b26bfa512",
      measurementId: "G-MQ1LVHF0N9"
    };

    // Inicializace Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const auth = getAuth(app);
    signInAnonymously(auth);

    // Leaflet mapa
    const map = L.map('map').setView([49.8, 15.5], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Kliknutí na mapu → formulář
    map.on('click', (e) => {
      const popupContent = document.createElement('div');
      popupContent.className = 'popup-form';
      popupContent.innerHTML = `
        <input type="text" placeholder="Tvoje jméno" id="nameInput"/>
        <textarea placeholder="Popisek" id="descInput"></textarea>
        <input type="file" accept="image/*" id="photoInput"/>
        <button id="uploadBtn">📸 Přidat</button>
      `;
      const popup = L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);

      popupContent.querySelector('#uploadBtn').onclick = async () => {
        const name = popupContent.querySelector('#nameInput').value;
        const desc = popupContent.querySelector('#descInput').value;
        const file = popupContent.querySelector('#photoInput').files[0];
        if (!file) return alert('Vyber fotku!');

        const photoRef = sRef(storage, `photos/${Date.now()}_${file.name}`);
        await uploadBytes(photoRef, file);
        const url = await getDownloadURL(photoRef);

        const newRef = push(ref(db, 'photos'));
        const timestamp = Date.now();
        await push(ref(db, 'photos'), {
          name, desc, url,
          lat: e.latlng.lat, lng: e.latlng.lng,
          timestamp
        });

        alert('✅ Fotka přidána!');
        map.closePopup();
      };
    });

    // Načtení všech fotek
    onValue(ref(db, 'photos'), (snapshot) => {
      map.eachLayer((layer) => {
        if (layer instanceof L.Marker) map.removeLayer(layer);
      });

      snapshot.forEach((child) => {
        const data = child.val();
        const age = Date.now() - data.timestamp;
        if (age > 24 * 60 * 60 * 1000) {
          remove(ref(db, 'photos/' + child.key)); // smaž po 24h
        } else {
          const marker = L.marker([data.lat, data.lng]).addTo(map);
          marker.bindPopup(`
            <b>${data.name}</b><br>
            ${data.desc}<br>
            <img src="${data.url}" style="width:150px;border-radius:10px;margin-top:5px;">
          `);
        }
      });
    });

    // Smazat všechny fotky (admin funkce)
    function deleteAllPhotos() {
      if (confirm("Opravdu chceš smazat všechny fotky?")) {
        remove(ref(db, 'photos'));
        alert("Všechny fotky smazány!");
      }
    }
  </script>
</body>
</html>
